<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="alert"></div>
        <h1 class="heading">Generate a <br><span id="password_heading">random password</span></h1>
    <p class="tag-line">Never use an insecure password again</p>
    <div class="input-wrapper">
        <div class="input-group">
            <label for="length">Password Length:</label>
            <input type="number" id="length" min="1" max="15">
        </div>
        <div class="input-group">
            <label for="include_uppercase">Include Uppercase Letters:</label>
            <input type="checkbox" id="include_uppercase" class="checkbox">
        </div>
        <div class="input-group">
            <label for="include_lowercase">Include Lowercase Letters:</label>
            <input type="checkbox" id="include_lowercase" class="checkbox">
        </div>
        <div class="input-group">
            <label for="include_numbers">Include Numbers:</label>
            <input type="checkbox" id="include_numbers" class="checkbox">
        </div>
        <div class="input-group">
            <label for="include_symbols">Include Symbols:</label>
            <input type="checkbox" id="include_symbols" class="checkbox">
        </div>
    </div>
    <button id="generate_btn">Generate Password</button>
    <div class="passwords">
        <div class="password" id="password1"></div>
        <div class="password" id="password2"></div>
    </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
